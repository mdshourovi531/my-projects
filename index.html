<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Realistic Swipe Snake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <button id="info-btn" class="info-icon">?</button>
        
        <header class="score-board">
            <div class="score-box"><span>SCORE</span><div id="current-score">0</div></div>
            <div class="score-box"><span>HIGH SCORE</span><div id="high-score">0</div></div>
        </header>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div id="overlay" class="overlay">
                <h1 id="overlay-title">SNAKE</h1>
                <p id="overlay-text">Swipe to Move or Use Arrow Keys</p>
                <button id="start-btn">START GAME</button>
            </div>

            <div id="inst-modal" class="modal hidden">
                <div class="modal-content">
                    <h2>HOW TO PLAY</h2>
                    <ul class="inst-list">
                        <li><span class="dot food"></span> <b>Food:</b> +10 Pts | Grows 1</li>
                        <li><span class="dot boost"></span> <b>Boost:</b> +50 Pts | Grows 2</li>
                        <li><span class="dot boom"></span> <b>Boom:</b> -70 Pts | Watch out!</li>
                    </ul>
                    <p><b>Mobile:</b> Swipe in the direction you want to turn.<br><b>Desktop:</b> WASD or Arrows.</p>
                    <button id="close-inst">GOT IT</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
